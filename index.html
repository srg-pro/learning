<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Generalist Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --surface2: #F5F4F0;
    --border: #E8E6E0;
    --border2: #D8D5CC;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #A8A49C;
    --ink: #0F0E0C;
    --shadow: rgba(0,0,0,0.06);
    --shadow-md: rgba(0,0,0,0.10);
    --radius: 12px;
    --sidebar-w: 260px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  @keyframes shimmer { from{background-position:-200% 0} to{background-position:200% 0} }
  .fade-up { animation: fadeUp 0.3s ease forwards; }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* TOP BAR */
  #topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px; height: 54px; flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 var(--border);
  }
  #topbar .logo {
    font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700;
    color: var(--ink); white-space: nowrap; letter-spacing: -0.3px;
  }
  #topbar .logo span { font-style: italic; color: var(--step-color, #555); }
  #topbar .divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
  #topbar .step-label {
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
  }
  #topbar .step-label strong { color: var(--text2); font-weight: 500; }
  #xp-area { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  #xp-area .xp-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); white-space: nowrap; }
  #xp-bar-wrap { width: 100px; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; border: 1px solid var(--border); }
  #xp-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #FF6B35, #A855F7, #3B82F6); transition: width 0.5s ease; }
  #duration-pill {
    font-family: 'DM Mono', monospace; font-size: 10px;
    padding: 4px 12px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    border: 1px solid var(--step-border, #ddd); background: var(--step-bg, #f9f9f9);
    color: var(--step-color, #555);
  }

  /* BODY ROW */
  #body { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; transition: width 0.25s ease; overflow: hidden;
  }
  #sidebar.collapsed { width: 56px; }
  #collapse-btn {
    display: flex; align-items: center; justify-content: flex-end; padding: 10px 14px;
    background: none; border: none; border-bottom: 1px solid var(--border);
    cursor: pointer; color: var(--text3); font-size: 14px; width: 100%;
    transition: color 0.2s;
  }
  #sidebar.collapsed #collapse-btn { justify-content: center; }
  #collapse-btn:hover { color: var(--text); }
  #collapse-icon { transition: transform 0.25s; }
  #sidebar.collapsed #collapse-icon { transform: rotate(180deg); }

  #steps-list { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0; }
  .step-item { border-left: 3px solid transparent; transition: all 0.2s; }
  .step-item.active { border-left-color: var(--step-color, #555); background: var(--step-bg-light, #f9f9f9); }
  .step-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 9px 14px; background: none; border: none; cursor: pointer;
    text-align: left; transition: background 0.15s;
  }
  .step-btn:hover { background: var(--surface2); }
  .step-icon-wrap { position: relative; flex-shrink: 0; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
  .step-emoji { font-size: 18px; line-height: 1; }
  .step-done-badge {
    position: absolute; top: -3px; right: -4px;
    width: 10px; height: 10px; border-radius: 50%;
    background: #22C55E; border: 2px solid var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 5px; color: white; font-weight: bold;
  }
  .step-partial-dot {
    position: absolute; top: -3px; right: -4px;
    width: 8px; height: 8px; border-radius: 50%;
    border: 2px solid var(--surface); animation: pulse 2s infinite;
  }
  .step-text { min-width: 0; flex: 1; }
  .step-num { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); letter-spacing: 1px; }
  .step-title { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
  .step-item.active .step-title { color: var(--text); font-weight: 500; }
  #sidebar.collapsed .step-text { display: none; }

  .topic-list { padding: 2px 10px 6px 14px; }
  .topic-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 5px 10px; background: none; border: none;
    cursor: pointer; border-radius: 8px; text-align: left; transition: background 0.15s;
  }
  .topic-btn:hover { background: var(--surface2); }
  .topic-btn.active { background: var(--step-bg-light, #f5f5f5); }
  .topic-check {
    width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
    border: 1.5px solid var(--border2); background: transparent;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .topic-check.done { border-color: #22C55E; background: #DCFCE7; }
  .topic-check.active-dot { border-color: var(--step-color, #888); }
  .topic-check .check-inner { width: 6px; height: 6px; border-radius: 50%; background: var(--step-color, #888); }
  .topic-check .check-tick { font-size: 8px; color: #22C55E; font-weight: bold; }
  .topic-name { font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topic-btn.active .topic-name { color: var(--text); font-weight: 500; }
  .topic-btn.done-topic .topic-name { color: #22C55E; }

  #sidebar-footer { padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
  #sidebar.collapsed #sidebar-footer { display: none; }
  .sidebar-progress-label { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .sidebar-progress-label span { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); }
  .sidebar-bar-wrap { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; border: 1px solid var(--border); }
  .sidebar-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  /* CONTENT AREA */
  #content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* TOPIC TABS */
  #topic-tabs {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface); overflow-x: auto; flex-shrink: 0;
  }
  .tab-btn {
    padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text3); white-space: nowrap; transition: all 0.2s;
    flex-shrink: 0;
  }
  .tab-btn:hover { background: var(--surface2); color: var(--text2); }
  .tab-btn.active { border-color: var(--step-color, #888); background: var(--step-bg-light, #f5f5f5); color: var(--text); font-weight: 500; }
  .tab-btn.done-tab { border-color: #BBF7D0; background: #F0FDF4; color: #22C55E; }
  #topic-tabs .subtitle-label { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }

  /* SCROLLABLE CONTENT */
  #scroll-content {
    flex: 1; overflow-y: auto; padding: 28px 32px 32px;
    scroll-behavior: smooth;
  }

  /* TOPIC HEADER CARD */
  .topic-header-card {
    display: flex; align-items: flex-start; gap: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 24px;
    box-shadow: 0 2px 12px var(--shadow);
    border-top: 3px solid var(--step-color, #ccc);
  }
  .topic-icon-box {
    width: 52px; height: 52px; border-radius: 12px;
    background: var(--step-bg-light, #f5f5f5); border: 1px solid var(--step-border, #ddd);
    display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0;
  }
  .topic-meta-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--step-color, #888); letter-spacing: 1.5px; margin-bottom: 5px; }
  .topic-heading { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--ink); line-height: 1.2; }
  .topic-badges { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .badge {
    font-family: 'DM Mono', monospace; font-size: 9px;
    padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2);
  }
  .badge.diff { border-color: transparent; }

  /* SECTION LABEL */
  .section-label {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .section-label .line { height: 1px; flex: 1; background: var(--border); }
  .section-label span { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 2px; white-space: nowrap; }

  /* PROGRESS BOX */
  .progress-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 24px;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .progress-box-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-box-header .plabel { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--step-color, #888); letter-spacing: 1.5px; }
  .progress-box-header .pcount { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); }
  .progress-box-header .pcount.done { color: #22C55E; }
  .progress-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 14px; border: 1px solid var(--border); }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .checklist-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 7px 0; cursor: pointer; transition: opacity 0.15s; border: none; background: none; width: 100%; text-align: left;
  }
  .checklist-item:hover { opacity: 0.8; }
  .checkbox {
    width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
    border: 1.5px solid var(--border2); background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.2s; cursor: pointer;
  }
  .checkbox.checked { border-color: var(--step-color, #888); background: var(--step-bg-light, #f5f5f5); }
  .checkbox .tick { font-size: 10px; font-weight: bold; }
  .checklist-text { font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text); line-height: 1.5; transition: all 0.2s; }
  .checklist-text.checked { color: var(--text3); text-decoration: line-through; }

  /* WHAT TO LEARN */
  .learn-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 24px;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .learn-item { border-bottom: 1px solid var(--border); }
  .learn-item:last-child { border-bottom: none; }
  .learn-btn {
    display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
    width: 100%; background: none; border: none; cursor: pointer; text-align: left;
    transition: background 0.15s;
  }
  .learn-btn:hover { background: var(--surface2); }
  .learn-diamond { color: var(--step-color, #888); font-size: 9px; margin-top: 5px; flex-shrink: 0; }
  .learn-text { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); line-height: 1.65; }
  .learn-arrow { color: var(--text3); font-size: 11px; flex-shrink: 0; margin-top: 4px; transition: transform 0.2s; }
  .learn-arrow.open { transform: rotate(180deg); }
  .deep-dive {
    margin: 0 16px 14px 36px; padding: 14px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--step-color, #ccc);
    border-radius: 8px;
  }
  .deep-dive-label { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--step-color, #888); letter-spacing: 1.5px; margin-bottom: 8px; }
  .deep-dive-text { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text2); line-height: 1.8; }

  /* RESOURCES */
  .resources-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .resource-card {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; justify-content: space-between;
    box-shadow: 0 1px 3px var(--shadow); transition: box-shadow 0.2s, border-color 0.2s;
  }
  .resource-card:hover { box-shadow: 0 3px 10px var(--shadow-md); border-color: var(--step-border, #ddd); }
  .resource-icon { font-size: 14px; flex-shrink: 0; }
  .resource-info .rname { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text); font-weight: 500; }
  .resource-info .rurl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 2px; }
  .resource-type {
    font-family: 'DM Mono', monospace; font-size: 8px; flex-shrink: 0;
    padding: 2px 7px; border-radius: 6px; border: 1px solid var(--step-border, #ddd);
    background: var(--step-bg-light, #f9f9f9); color: var(--step-color, #888);
  }

  /* MISSION */
  .mission-card {
    border-radius: 14px; padding: 20px; margin-bottom: 20px;
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--step-bg-light, #f9f9f9), var(--surface));
    border: 1px solid var(--step-border, #e0e0e0);
    box-shadow: 0 2px 8px var(--shadow);
  }
  .mission-watermark {
    position: absolute; bottom: -8px; right: 12px;
    font-size: 64px; opacity: 0.05; pointer-events: none; user-select: none;
  }
  .mission-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--step-color, #888); letter-spacing: 1.5px; margin-bottom: 12px; }
  .mission-text { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--ink); line-height: 1.85; font-style: italic; }

  /* NOTES */
  .notes-trigger {
    display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 14px; background: var(--surface); border-radius: 10px; cursor: pointer;
    border: 1.5px dashed var(--border2); transition: all 0.2s; text-align: left;
  }
  .notes-trigger.has-note { border-style: solid; border-color: var(--step-border, #ddd); background: var(--step-bg-light, #fafafa); }
  .notes-trigger:hover { border-color: var(--step-color, #aaa); }
  .notes-trigger-icon { font-size: 18px; }
  .notes-trigger-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 1px; }
  .notes-trigger.has-note .notes-trigger-label { color: var(--step-color, #888); }
  .notes-preview { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text3); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 380px; }
  .notes-editor { background: var(--surface); border: 1px solid var(--step-border, #ddd); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px var(--shadow); }
  .notes-textarea {
    width: 100%; min-height: 110px; background: transparent; border: none;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    line-height: 1.7; padding: 16px; outline: none; resize: vertical;
  }
  .notes-actions { display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--border); }
  .btn-save {
    padding: 7px 18px; border-radius: 8px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px;
    background: var(--step-color, #888); color: white; border: none; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel {
    padding: 7px 18px; border-radius: 8px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px;
    background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); transition: background 0.2s;
  }
  .btn-cancel:hover { background: var(--border); }

  /* BOTTOM NAV */
  #bottom-nav {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 32px 16px; border-top: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .nav-btn {
    padding: 11px 20px; border-radius: 10px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px; transition: all 0.2s;
    border: 1px solid var(--border2); background: var(--surface2); color: var(--text2);
  }
  .nav-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn.primary {
    background: var(--step-color, #888); color: white; border-color: transparent;
    font-weight: 500; box-shadow: 0 4px 14px var(--step-glow, rgba(0,0,0,0.1));
  }
  .nav-btn.primary:hover { opacity: 0.9; }
  .nav-btn.complete { background: #F0FDF4; color: #22C55E; border-color: #BBF7D0; cursor: default; }
  #step-dots { flex: 1; display: flex; justify-content: center; align-items: center; gap: 6px; }
  .step-dot { height: 8px; border-radius: 4px; cursor: pointer; border: none; transition: all 0.25s; background: var(--border2); }
  .step-dot.active { width: 24px; background: var(--step-color, #888); }
  .step-dot:not(.active) { width: 8px; }

  /* ── MOBILE ── */
  @media (max-width: 767px) {
    #sidebar { display: none; }
    #topbar { padding: 0 14px; gap: 10px; }
    #topbar .logo { font-size: 13px; }
    #topbar .step-label { display: none; }
    #duration-pill { font-size: 9px; padding: 3px 8px; }
    #xp-area { gap: 7px; }
    #xp-bar-wrap { width: 70px; }

    /* Mobile sticky header extension */
    #mobile-nav {
      display: block;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 54px; z-index: 30;
    }
    #mobile-steps { display: flex; gap: 5px; padding: 10px 14px 8px; overflow-x: auto; }
    #mobile-step-pill {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--surface2);
      font-size: 16px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s; position: relative;
    }
    #mobile-step-pill.active { border-color: var(--step-color, #888); background: var(--step-bg-light, #f5f5f5); }
    #mobile-overall-progress { padding: 0 14px 6px; }
    #mobile-progress-track { height: 2px; background: var(--surface2); border-radius: 1px; overflow: hidden; }
    #mobile-progress-fill { height: 100%; border-radius: 1px; transition: width 0.4s; }
    #mobile-progress-pct { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); text-align: right; margin-top: 3px; padding-bottom: 4px; }
    #mobile-tabs { display: flex; gap: 6px; padding: 0 14px 10px; overflow-x: auto; border-bottom: 1px solid var(--border); }

    #topic-tabs { display: none; }
    #content-area { overflow: hidden; }
    #scroll-content { padding: 16px 14px 120px; }
    .resources-grid { grid-template-columns: 1fr; }

    #bottom-nav { padding: 10px 14px 20px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
    #step-dots { display: none; }
    .topic-header-card { padding: 14px; }
    .topic-heading { font-size: 18px; }
    #scroll-content { padding-bottom: 100px; }
  }
  @media (min-width: 768px) {
    #mobile-nav { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="logo">AI <span id="logo-step-name">Generalist</span></div>
    <div class="divider"></div>
    <div class="step-label"><strong id="topbar-step-label">7 Steps · 18 Weeks</strong></div>
    <div id="xp-area">
      <span class="xp-label" id="xp-label">⚡ 0 / 3300 XP</span>
      <div id="xp-bar-wrap"><div id="xp-bar" style="width:0%"></div></div>
      <span class="xp-label" id="topics-done-label">0/14 done</span>
    </div>
    <div class="divider"></div>
    <div id="duration-pill">3–4 Weeks</div>
  </div>

  <!-- MOBILE NAV (injected by JS) -->
  <div id="mobile-nav"></div>

  <div id="body">

          {text:"Connect to AI APIs via Zapier or Make.com (no-code API calls)", deep:"In Bubble: use the API Connector plugin to call OpenAI/Claude API. Map UI inputs to API params, display outputs dynamically. In Make.com: HTTP module → POST to api.openai.com/v1/chat/completions → parse JSON response. No code needed."},
          {text:"Use Pineapple Builder or Softr for quick landing pages", deep:"Pineapple Builder: AI generates an entire landing page from a description. Softr: turns Airtable data into web apps and portals. Add Stripe via Softr's built-in integration for monetization."},
          {text:"Build internal tools with Retool or AppSmith", deep:"Retool: drag-and-drop UI connected to any database or API. Used by Brex, Plaid, Amazon. Build an AI admin dashboard in 4 hours. AppSmith: open-source alternative (self-host for free)."},
        ],
        resources:[
          {name:"Bubble.io — no-code web apps", url:"bubble.io", type:"Platform"},
          {name:"Glide — apps from spreadsheets", url:"glideapps.com", type:"Platform"},
          {name:"Retool — internal tools", url:"retool.com", type:"Platform"},
          {name:"Softr — Airtable-powered apps", url:"softr.io", type:"Platform"},
        ],
        practice:"Launch a micro-SaaS: an AI tool that solves ONE specific problem for a niche. Examples: AI resume reviewer for nurses, AI email writer for real estate agents. Put it online with a real payment link. Aim for $1 in revenue.",
        checklist:["Chosen a specific niche problem","Built MVP in Bubble or Glide","Integrated AI API endpoint","Published live with payment link"],
        timeEstimate:"~15 hours"
      },
      { name:"Product Thinking for AI", xp:200, difficulty:"Intermediate",
        details:[
          {text:"Define: Who is it for? What problem does it solve?", deep:"The trap: building a cool AI demo instead of a product. A product has a specific user (not 'everyone'), a painful problem (they'd pay to solve it), and a clear outcome. Write one sentence: '[Product name] helps [specific person] [do X] so they can [outcome]'."},
          {text:"Design user flows using FigJam or Whimsical", deep:"A user flow maps every screen and decision a user makes. Start → Sign up → Onboarding → Core feature → Result → Share/Upgrade. In Whimsical: use the Flowchart tool, 30 minutes max. This prevents building features nobody needs."},
          {text:"Build an MVP in 1 week using no-code stack", deep:"MVP = the minimum set of features that delivers the core value. For an AI writing tool: MVP = text input + AI output. Not: user accounts, history, sharing, templates. Add those after validation. Week 1: build. Week 2: get 10 users."},
          {text:"Collect feedback and iterate using AI-powered surveys", deep:"Use Typeform with Notion integration. After users complete a task: 3 questions max. (1) On a scale 1–10, how likely are you to recommend this? (2) What's the #1 thing missing? (3) What would make you pay for this? Feed responses to Claude."},
        ],
        resources:[
          {name:"Whimsical — flowcharts & wireframes", url:"whimsical.com", type:"Tool"},
          {name:"Typeform — user surveys", url:"typeform.com", type:"Tool"},
          {name:"ProductHunt — product launch", url:"producthunt.com", type:"Community"},
          {name:"Lenny's Newsletter — product advice", url:"lennysnewsletter.com", type:"Newsletter"},
        ],
        practice:"Submit your AI product to ProductHunt. Get 10 real users to try it (not friends — strangers). Collect feedback. Write a post-launch retrospective: what worked, what failed, what you'd do differently.",
        checklist:["Written the one-sentence product definition","Mapped complete user flow in Whimsical","Built and published MVP","Collected feedback from 10+ real users"],
        timeEstimate:"~20 hours"
      },
    ]
  },
  {
    id:7, icon:"⚙️", title:"Automations & Agentic Workflows", subtitle:"Mastery Layer", duration:"4–5 Weeks",
    color:"#0369A1", glow:"rgba(3,105,161,0.12)", bgLight:"#F0F9FF", border:"#BAE6FD",
    topics:[
      { name:"Advanced Automation Stacks", xp:300, difficulty:"Advanced",
        details:[
          {text:"Master Make.com (Integromat) for complex multi-step workflows", deep:"Make.com is the most powerful no-code automation tool. Key concepts: Scenarios (workflows), Modules (steps), Routers (conditional branching), Iterators (loop through arrays). Build a scenario with 10+ modules. Use the HTTP module to call any AI API."},
          {text:"Use n8n (open-source) for self-hosted automation", deep:"n8n = Make.com but open-source and self-hostable. Deploy on Railway or Hetzner VPS for ~$5/month. Supports 400+ integrations. Has an AI Agent node built-in. Best for teams that need data privacy or high volume automations without per-operation costs."},
          {text:"Build event-driven workflows: trigger → process → output", deep:"Event-driven = workflow starts when something happens. Examples: (1) New form submission → AI scores lead → add to CRM. (2) New tweet mentioning you → AI analyzes sentiment → notify Slack. (3) New invoice received → AI extracts data → adds to spreadsheet."},
          {text:"Integrate AI steps inside automation chains (GPT calls in Make)", deep:"In Make.com: HTTP module → POST to https://api.openai.com/v1/chat/completions → Body with your prompt. Map the response content to the next module. This lets you add AI intelligence to any automation at any step."},
        ],
        resources:[
          {name:"Make.com — no-code automation", url:"make.com", type:"Platform"},
          {name:"n8n — self-hosted automation", url:"n8n.io", type:"Open Source"},
          {name:"Zapier — simple automation", url:"zapier.com", type:"Platform"},
          {name:"Activepieces — open-source Zapier", url:"activepieces.com", type:"Open Source"},
        ],
        practice:"Build this automation: New email in Gmail → AI (Claude) reads and categorizes it → adds summary + category to Notion database → if category = 'Urgent', sends Slack DM to you. Time to build: under 2 hours in Make.com.",
        checklist:["Built first Make.com scenario","Created n8n workflow on self-hosted instance","Integrated AI step in automation","Built complete email-to-Notion pipeline"],
        timeEstimate:"~12 hours"
      },
      { name:"Agentic Workflow Architecture", xp:400, difficulty:"Expert",
        details:[
          {text:"Design end-to-end agentic pipelines with LangGraph", deep:"LangGraph models your agent as a graph: nodes (functions that transform state) and edges (transitions between nodes, can be conditional). Unlike LangChain chains, LangGraph supports cycles (agent can loop, retry, re-plan). This enables much more robust agents that can self-correct."},
          {text:"Implement conditional branching based on AI output", deep:"Example: after research step, agent checks: 'Is the research sufficient?' If yes → proceed to writing. If no → loop back and search again (with a max_retries limit). In LangGraph: define a conditional_edge that routes based on a function."},
          {text:"Add human approval nodes at critical decision points", deep:"LangGraph's interrupt() function pauses execution and waits for human input. Use case: before sending an email on behalf of a user, pause and show the draft. User approves → graph continues. This makes agents safe to deploy for high-stakes actions."},
          {text:"Monitor, log, and debug agent runs with LangSmith", deep:"LangSmith gives you traces of every agent run: each LLM call, token usage, latency, tool calls. You can replay any run, add annotations, and set up automated evaluations. Essential for debugging when your agent fails. Also tracks costs."},
        ],
        resources:[
          {name:"LangGraph documentation", url:"langchain-ai.github.io/langgraph", type:"Docs"},
          {name:"LangSmith — agent observability", url:"smith.langchain.com", type:"Platform"},
          {name:"Flowise AI — visual agent builder", url:"flowiseai.com", type:"Tool"},
          {name:"Temporal — workflow orchestration", url:"temporal.io", type:"Platform"},
        ],
        practice:"Build a full client onboarding workflow: Typeform submission → AI qualifies lead (scores 1–10) → if score ≥ 7: books Calendly meeting + sends personalized welcome email → logs everything to Notion. Full LangGraph pipeline with human approval before email send.",
        checklist:["Built LangGraph graph with 3+ nodes","Implemented conditional branching","Added human-in-the-loop interrupt","Set up LangSmith monitoring"],
        timeEstimate:"~18 hours"
      },
    ]
  },
];

const DIFF_COLORS = { Beginner:"#059669", Intermediate:"#D97706", Advanced:"#DC2626", Expert:"#7C3AED" };
const DIFF_BG = { Beginner:"#ECFDF5", Intermediate:"#FFFBEB", Advanced:"#FEF2F2", Expert:"#F5F3FF" };
const DIFF_BORDER = { Beginner:"#A7F3D0", Intermediate:"#FDE68A", Advanced:"#FECACA", Expert:"#DDD6FE" };
const STORAGE_KEY = "ai_roadmap_html_v1";

// ── STATE ─────────────────────────────────────────────────────────────────
let activeStep = 0, activeTopic = 0, expandedDetail = null, showNotes = false;
let persist = { completed:{}, notes:{} };
try { const r = localStorage.getItem(STORAGE_KEY); if(r) persist = JSON.parse(r); } catch{}

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(persist)); } catch{} }
function cKey(si,ti,ci) { return `${si}-${ti}-${ci}`; }
function tKey(si,ti) { return `${si}-${ti}`; }
function isTopicDone(si,ti) { return steps[si].topics[ti].checklist.every((_,ci)=>persist.completed[cKey(si,ti,ci)]); }

function totalXP() { return steps.reduce((a,s)=>a+s.topics.reduce((b,t)=>b+t.xp,0),0); }
function earnedXP() { return steps.reduce((a,s,si)=>a+s.topics.reduce((b,t,ti)=>b+(isTopicDone(si,ti)?t.xp:0),0),0); }
function totalTopics() { return steps.reduce((a,s)=>a+s.topics.length,0); }
function completedTopics() { return steps.reduce((a,s,si)=>a+s.topics.filter((_,ti)=>isTopicDone(si,ti)).length,0); }

// ── APPLY STEP COLORS ─────────────────────────────────────────────────────
function applyStepColors(step) {
  document.documentElement.style.setProperty('--step-color', step.color);
  document.documentElement.style.setProperty('--step-bg', step.bgLight);
  document.documentElement.style.setProperty('--step-bg-light', step.bgLight);
  document.documentElement.style.setProperty('--step-border', step.border);
  document.documentElement.style.setProperty('--step-glow', step.glow);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const step = steps[activeStep];
  const topic = step.topics[activeTopic];
  applyStepColors(step);

  // Topbar
  document.getElementById('logo-step-name').textContent = step.title;
  document.getElementById('logo-step-name').style.color = step.color;
  document.getElementById('topbar-step-label').textContent = `Step ${step.id} · ${step.subtitle} · 7 Steps · 18 Weeks`;
  document.getElementById('duration-pill').textContent = step.duration;
  const txp = totalXP(), exp = earnedXP(), tt = totalTopics(), ct = completedTopics();
  document.getElementById('xp-label').textContent = `⚡ ${exp} / ${txp} XP`;
  document.getElementById('xp-bar').style.width = `${Math.round(exp/txp*100)}%`;
  document.getElementById('topics-done-label').textContent = `${ct}/${tt} done`;

  // Sidebar
  renderSidebar();

  // Mobile nav
  renderMobileNav();

  // Topic tabs
  renderTopicTabs();

  // Content
  renderContent();

  // Bottom nav
  renderBottomNav();

  // Sidebar progress
  const pct = Math.round(ct/tt*100);
  document.getElementById('sidebar-pct').textContent = `${pct}%`;
  const sb = document.getElementById('sidebar-bar');
  sb.style.width = `${pct}%`;
  sb.style.background = step.color;
}

function renderSidebar() {
  const list = document.getElementById('steps-list');
  list.innerHTML = steps.map((s, si) => {
    const done = s.topics.every((_,ti)=>isTopicDone(si,ti));
    const partial = !done && s.topics.some((_,ti)=>isTopicDone(si,ti));
    const isActive = si === activeStep;
    const badge = done ? `<span class="step-done-badge">✓</span>` : partial ? `<span class="step-partial-dot" style="background:${s.color}"></span>` : '';
    const topics = isActive ? `<div class="topic-list">${s.topics.map((t,ti)=>{
      const tdone = isTopicDone(si,ti);
      const tactive = ti === activeTopic;
      const inner = tdone ? `<span class="check-tick">✓</span>` : tactive ? `<div class="check-inner"></div>` : '';
      const checkCls = tdone ? 'done' : tactive ? 'active-dot' : '';
      return `<button class="topic-btn${tactive?' active':''}${tdone?' done-topic':''}" onclick="selectTopic(${si},${ti})">
        <div class="topic-check ${checkCls}">${inner}</div>
        <span class="topic-name">${t.name}</span>
      </button>`;
    }).join('')}</div>` : '';
    return `<div class="step-item${isActive?' active':''}" style="${isActive?`border-left-color:${s.color};background:${s.bgLight}`:''}">
      <button class="step-btn" onclick="selectStep(${si})">
        <div class="step-icon-wrap"><span class="step-emoji">${s.icon}</span>${badge}</div>
        <div class="step-text">
          <div class="step-num">STEP ${s.id}</div>
          <div class="step-title">${s.title}</div>
        </div>
      </button>
      ${topics}
    </div>`;
  }).join('');
}

function renderMobileNav() {
  const mn = document.getElementById('mobile-nav');
  const step = steps[activeStep];
  const ct = completedTopics(), tt = totalTopics();
  const pct = Math.round(ct/tt*100);
  mn.innerHTML = `
    <div id="mobile-steps">${steps.map((s,si)=>{
      const done = s.topics.every((_,ti)=>isTopicDone(si,ti));
      const partial = !done && s.topics.some((_,ti)=>isTopicDone(si,ti));
      const isActive = si === activeStep;
      const badge = done ? `<span style="position:absolute;top:-3px;right:-4px;width:10px;height:10px;border-radius:50%;background:#22C55E;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:5px;color:white;font-weight:bold">✓</span>`
        : partial ? `<span style="position:absolute;top:-3px;right:-4px;width:8px;height:8px;border-radius:50%;background:${s.color};border:2px solid white;animation:pulse 2s infinite"></span>` : '';
      return `<button id="mobile-step-pill" class="${isActive?'active':''}" style="${isActive?`border-color:${s.color};background:${s.bgLight}`:''}" onclick="selectStep(${si})">${s.icon}${badge}</button>`;
    }).join('')}</div>
    <div id="mobile-overall-progress">
      <div id="mobile-progress-track"><div id="mobile-progress-fill" style="width:${pct}%;background:${step.color}"></div></div>
      <div id="mobile-progress-pct">${pct}% complete</div>
    </div>
    <div id="mobile-tabs">${step.topics.map((t,ti)=>{
      const done = isTopicDone(activeStep,ti);
      const isActive = ti === activeTopic;
      return `<button class="tab-btn${isActive?' active':''}${done?' done-tab':''}" onclick="selectTopic(${activeStep},${ti})">${done?'✓ ':''}${t.name}</button>`;
    }).join('')}</div>`;
}

function renderTopicTabs() {
  const step = steps[activeStep];
  document.getElementById('topic-tabs').innerHTML =
    step.topics.map((t,ti)=>{
      const done = isTopicDone(activeStep,ti);
      const isActive = ti === activeTopic;
      return `<button class="tab-btn${isActive?' active':''}${done?' done-tab':''}" onclick="selectTopic(${activeStep},${ti})">${done?'✓ ':''}${t.name}</button>`;
    }).join('') + `<span class="subtitle-label">${step.subtitle}</span>`;
}

function renderContent() {
  const step = steps[activeStep];
  const topic = step.topics[activeTopic];
  const checkedCount = topic.checklist.filter((_,ci)=>persist.completed[cKey(activeStep,activeTopic,ci)]).length;
  const topicPct = Math.round(checkedCount/topic.checklist.length*100);
  const note = persist.notes[tKey(activeStep,activeTopic)] || '';

  const sc = document.getElementById('scroll-content');
  sc.className = 'fade-up';
  void sc.offsetWidth; // force reflow

  sc.innerHTML = `
    <!-- Header card -->
    <div class="topic-header-card" style="border-top-color:${step.color}">
      <div class="topic-icon-box" style="background:${step.bgLight};border-color:${step.border}">${step.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="topic-meta-label" style="color:${step.color}">STEP ${step.id} · TOPIC ${activeTopic+1}/${step.topics.length} · ${step.subtitle.toUpperCase()}</div>
        <div class="topic-heading">${topic.name}</div>
        <div class="topic-badges">
          <span class="badge diff" style="background:${DIFF_BG[topic.difficulty]};color:${DIFF_COLORS[topic.difficulty]};border-color:${DIFF_BORDER[topic.difficulty]}">${topic.difficulty}</span>
          <span class="badge">⚡ ${topic.xp} XP</span>
          <span class="badge">🕐 ${topic.timeEstimate}</span>
        </div>
      </div>
    </div>

    <!-- Progress checklist -->
    <div class="progress-box">
      <div class="progress-box-header">
        <span class="plabel" style="color:${step.color}">TOPIC PROGRESS</span>
        <span class="pcount ${topicPct===100?'done':''}">${checkedCount}/${topic.checklist.length} tasks${topicPct===100?' ✓ DONE':''}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${topicPct}%;background:${topicPct===100?'#22C55E':step.color}"></div>
      </div>
      ${topic.checklist.map((item,ci)=>{
        const checked = !!persist.completed[cKey(activeStep,activeTopic,ci)];
        return `<button class="checklist-item" onclick="toggleCheck(${ci})">
          <div class="checkbox ${checked?'checked':''}" style="${checked?`border-color:${step.color};background:${step.bgLight}`:''}">
            ${checked?`<span class="tick" style="color:${step.color}">✓</span>`:''}
          </div>
          <span class="checklist-text ${checked?'checked':''}">${item}</span>
        </button>`;
      }).join('')}
    </div>

    <!-- What to learn -->
    <div class="section-label"><div class="line"></div><span>WHAT TO LEARN — CLICK TO DEEP DIVE</span><div class="line"></div></div>
    <div class="learn-card">
      ${topic.details.map((d,i)=>{
        const isOpen = expandedDetail===i;
        return `<div class="learn-item">
          <button class="learn-btn" onclick="toggleDetail(${i})">
            <span class="learn-diamond" style="color:${step.color}">◆</span>
            <span class="learn-text">${d.text}</span>
            <span class="learn-arrow${isOpen?' open':''}">▾</span>
          </button>
          ${isOpen?`<div class="deep-dive" style="border-left-color:${step.color}">
            <div class="deep-dive-label" style="color:${step.color}">DEEP DIVE</div>
            <div class="deep-dive-text">${d.deep}</div>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>

    <!-- Resources -->
    <div class="section-label"><div class="line"></div><span>BEST RESOURCES</span><div class="line"></div></div>
    <div class="resources-grid" style="margin-bottom:24px">
      ${topic.resources.map(r=>`
        <div class="resource-card">
          <div style="display:flex;gap:10px;align-items:center;min-width:0">
            <span class="resource-icon">📎</span>
            <div class="resource-info">
              <div class="rname">${r.name}</div>
              <div class="rurl">${r.url}</div>
            </div>
          </div>
          <span class="resource-type" style="color:${step.color};background:${step.bgLight};border-color:${step.border}">${r.type}</span>
        </div>`).join('')}
    </div>

    <!-- Mission -->
    <div class="section-label"><div class="line"></div><span>HANDS-ON MISSION</span><div class="line"></div></div>
    <div class="mission-card" style="background:linear-gradient(135deg,${step.bgLight},white);border-color:${step.border}">
      <div class="mission-watermark">🎯</div>
      <div class="mission-label" style="color:${step.color}">YOUR PRACTICE TASK</div>
      <div class="mission-text">${topic.practice}</div>
    </div>

    <!-- Notes -->
    <div class="section-label"><div class="line"></div><span>YOUR NOTES</span><div class="line"></div></div>
    <div id="notes-area">${renderNotes(note, step)}</div>
  `;

  sc.scrollTop = 0;
}

function renderNotes(note, step) {
  if (showNotes) {
    return `<div class="notes-editor" style="border-color:${step.border}">
      <textarea class="notes-textarea" id="notes-input" placeholder="Jot down: what you learned, what confused you, ideas to try...">${note}</textarea>
      <div class="notes-actions">
        <button class="btn-save" style="background:${step.color}" onclick="saveNote()">Save</button>
        <button class="btn-cancel" onclick="cancelNote()">Cancel</button>
      </div>
    </div>`;
  }
  return `<button class="notes-trigger ${note?'has-note':''}" style="${note?`border-color:${step.border};background:${step.bgLight}`:''}" onclick="openNote()">
    <span class="notes-trigger-icon">📝</span>
    <div style="min-width:0;flex:1">
      <div class="notes-trigger-label" style="${note?`color:${step.color}`:''}">
        ${note ? 'NOTES SAVED — click to edit' : 'ADD YOUR NOTES'}
      </div>
      ${note ? `<div class="notes-preview">${note}</div>` : ''}
    </div>
  </button>`;
}

function renderBottomNav() {
  const step = steps[activeStep];
  const isFirst = activeStep===0 && activeTopic===0;
  const isLast = activeStep===steps.length-1 && activeTopic===step.topics.length-1;

  document.getElementById('btn-back').disabled = isFirst;

  const dots = document.getElementById('step-dots');
  dots.innerHTML = steps.map((s,si)=>`<button class="step-dot${si===activeStep?' active':''}" style="${si===activeStep?`background:${step.color}`:''}" onclick="selectStep(${si})"></button>`).join('');

  const nextBtn = document.getElementById('btn-next');
  if (isLast) {
    nextBtn.textContent = `✓ AI Generalist! (${earnedXP()} XP)`;
    nextBtn.className = 'nav-btn complete';
    nextBtn.onclick = null;
  } else {
    nextBtn.className = 'nav-btn primary';
    nextBtn.style.background = step.color;
    nextBtn.style.boxShadow = `0 4px 14px ${step.glow}`;
    nextBtn.onclick = goNext;
    if (activeTopic < step.topics.length-1) nextBtn.textContent = 'Next Topic →';
    else nextBtn.textContent = `Step ${activeStep+2}: ${steps[activeStep+1].icon} →`;
  }
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function selectStep(si) { activeStep=si; activeTopic=0; expandedDetail=null; showNotes=false; render(); }
function selectTopic(si,ti) { activeStep=si; activeTopic=ti; expandedDetail=null; showNotes=false; render(); }
function goNext() {
  const step=steps[activeStep];
  if(activeTopic<step.topics.length-1){ activeTopic++; } else if(activeStep<steps.length-1){ activeStep++; activeTopic=0; }
  expandedDetail=null; showNotes=false; render();
}
function goPrev() {
  if(activeTopic>0){ activeTopic--; } else if(activeStep>0){ activeStep--; activeTopic=steps[activeStep].topics.length-1; }
  expandedDetail=null; showNotes=false; render();
}
function toggleCheck(ci) {
  const key=cKey(activeStep,activeTopic,ci);
  persist.completed[key]=!persist.completed[key];
  save(); render();
}
function toggleDetail(i) { expandedDetail = expandedDetail===i ? null : i; renderContent(); }
function openNote() { showNotes=true; renderContent(); setTimeout(()=>{const el=document.getElementById('notes-input');if(el)el.focus();},50); }
function cancelNote() { showNotes=false; renderContent(); }
function saveNote() {
  const val = (document.getElementById('notes-input')||{}).value||'';
  persist.notes[tKey(activeStep,activeTopic)]=val;
  save(); showNotes=false; render();
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ── INIT ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
